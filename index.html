<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Misbah ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="flow-container" id="flow-container"></div>

    <div class="screen" id="screen1">
        <h1 class="loving-title">My Heart, Misbah❤️</h1>
        <p class="love-note">Every single moment spent with you is like a beautiful dream come true... ❤️</p>
        <button class="main-btn" onclick="showScreen(2)">Open Your Surprise ❤️</button>
    </div>

    <div class="screen hidden" id="screen2">
        <div class="cube-container">
            <div class="cube">
                <div class="face front"><span>Misbah ❤️ Osama</span></div>
                <div class="face back"><span>06-03-2024 ❤️</span></div>
                <div class="face right"><span>I Love Misbah ❤️</span></div>
                <div class="face left"><span>MissU ❤️</span></div>
                <div class="face top"><span>Meri Jaan ❤️</span></div>
                <div class="face bottom"><span>My Love ❤️</span></div>
            </div>
        </div>
        <div class="message-box">
            <p id="typing-text"></p>
            <button class="main-btn pink-btn" onclick="showScreen(3)">Click to See Our Memories 📸</button>
        </div>
    </div>

    <div class="screen hidden" id="screen3">
        <h2 class="gallery-title">Our Beautiful Memories</h2>
        <div class="gallery">
            <div class="polaroid">
                <img src="1.jpg" alt="Memory 1">
                <p>Haya aur Khubsurti ❤️</p>
            </div>
            <div class="polaroid">
                <img src="2.jpg" alt="Memory 2">
                <p>Meri World ✨</p>
            </div>
            <div class="polaroid">
                <img src="3.jpeg" alt="Memory 3">
                <p>MashAllah ❤️</p>
            </div>
        </div>
        <p class="final-note">I love you more than anyone can imagine. ❤️</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
